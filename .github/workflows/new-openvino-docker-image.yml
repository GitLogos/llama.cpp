name: Publish OpenVINO Ubuntu22 llama-server to GHCR

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Moving tag on main
            type=raw,value=openvino22-server,enable={{is_default_branch}}

            # Branch tag (e.g., openvino22-server-main)
            type=ref,event=branch,prefix=openvino22-server-

            # Semver tags when pushing vX.Y.Z
            type=semver,pattern={{version}},prefix=openvino22-server-,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},prefix=openvino22-server-,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            # Short SHA tag
            type=sha,format=short,prefix=openvino22-server-sha-

      - name: Build and push (server target)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devops/openvino22.Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
