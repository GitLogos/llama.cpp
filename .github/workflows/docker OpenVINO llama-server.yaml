name: Publish OpenVINO llama-server to GHCR

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Docker official GitHub Actions pattern [2](https://bing.com/search?q=llama.cpp+docker.yml+workflow+openvino+image+build+target)

      - name: Log in to GHCR
        uses: docker/login-action@v3 # Docker official GitHub Actions pattern [2](https://bing.com/search?q=llama.cpp+docker.yml+workflow+openvino+image+build+target)
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5 # Docker official GitHub Actions pattern [2](https://bing.com/search?q=llama.cpp+docker.yml+workflow+openvino+image+build+target)
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Always publish a moving "openvino-server" tag on main
            type=raw,value=openvino-server,enable={{is_default_branch}}

            # Branch tag (e.g., openvino-server-main)
            type=ref,event=branch,prefix=openvino-server-

            # Semver tags when pushing vX.Y.Z (e.g., openvino-server-1.2.3 and openvino-server-1.2)
            type=semver,pattern={{version}},prefix=openvino-server-,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},prefix=openvino-server-,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            # Short SHA tag (e.g., openvino-server-sha-1a2b3c4)
            type=sha,format=short,prefix=openvino-server-sha-

      - name: Build and push (server target)
        uses: docker/build-push-action@v5 # Docker official GitHub Actions pattern [2](https://bing.com/search?q=llama.cpp+docker.yml+workflow+openvino+image+build+target)
        with:
          context: .
          file: .devops/openvino.Dockerfile
          target: server  # llama.cpp OpenVINO docs show building the "server" target [1](https://oneuptime.com/blog/post/2026-02-20-github-actions-docker-build-push/view)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
