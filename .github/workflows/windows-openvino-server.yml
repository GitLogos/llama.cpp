name: windows-openvino-llama-server

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build-windows-openvino-server:
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release

      # OpenVINO archive (Windows). Update when bumping OpenVINO.
      OV_VERSION: "2026.0.0.20965.c6d6a13a886"
      OV_URL: "https://storage.openvinotoolkit.org/repositories/openvino/packages/2026.0/windows/openvino_toolkit_windows_2026.0.0.20965.c6d6a13a886_x86_64.zip"

      # vcpkg location
      VCPKG_ROOT: "C:\\vcpkg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MSVC dev environment (cl/link) - needed for Ninja+MSVC
      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Cache OpenVINO extracted directory
      - name: Cache OpenVINO
        uses: actions/cache@v4
        with:
          path: C:\openvino
          key: openvino-${{ env.OV_VERSION }}-windows-x64

      - name: Download + Extract OpenVINO (if not cached)
        shell: pwsh
        run: |
          if (!(Test-Path "C:\openvino")) {
            New-Item -ItemType Directory -Force -Path "C:\ovtmp" | Out-Null
            Write-Host "Downloading OpenVINO: $env:OV_URL"
            curl.exe -L "$env:OV_URL" --output "C:\ovtmp\openvino.zip"
            Expand-Archive -Path "C:\ovtmp\openvino.zip" -DestinationPath "C:\ovtmp\extract"
            $dir = Get-ChildItem "C:\ovtmp\extract" | Where-Object { $_.PSIsContainer } | Select-Object -First 1
            if (-not $dir) { throw "OpenVINO archive extraction failed (no directory found)." }
            Move-Item $dir.FullName "C:\openvino"
          }

      # Cache vcpkg (repo + installed packages)
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg
          key: vcpkg-windows-x64-opencl

      - name: Install OpenCL via vcpkg (required by OpenVINO backend)
        shell: pwsh
        run: |
          if (!(Test-Path "${env:VCPKG_ROOT}\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg "${env:VCPKG_ROOT}"
            & "${env:VCPKG_ROOT}\bootstrap-vcpkg.bat"
          }
          # Install OpenCL headers+library for x64
          & "${env:VCPKG_ROOT}\vcpkg.exe" install opencl:x64-windows
          # Optional: integrates toolchain with VS/CMake, not required for CI
          # & "${env:VCPKG_ROOT}\vcpkg.exe" integrate install

      - name: Configure + Build llama-server (OpenVINO)
        shell: cmd
        run: |
          call C:\openvino\setupvars.bat

          cmake -S . -B build\ReleaseOV -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DGGML_OPENVINO=ON ^
            -DLLAMA_CURL=OFF ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows

          cmake --build build\ReleaseOV --config %BUILD_TYPE% --parallel

      - name: Stage llama-server.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null

          $server = Get-ChildItem -Path "build\ReleaseOV" -Recurse -Filter "llama-server.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $server) { throw "llama-server.exe not found after build." }

          Copy-Item $server.FullName "dist\llama-server.exe" -Force

      # Optional: bundle OpenVINO runtime DLLs next to the EXE so it runs without OpenVINO installed
      # (You requested this approach earlier; keep it here since it aligns with "no extra requirements".)
      - name: Bundle OpenVINO runtime DLLs (self-contained)
        shell: pwsh
        run: |
          $ovRoot = "C:\openvino"
          $openvinoDll = Get-ChildItem -Path $ovRoot -Recurse -Filter "openvino.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $openvinoDll) { throw "Could not locate openvino.dll under $ovRoot" }

          $ovBin = $openvinoDll.Directory.FullName
          Write-Host "Detected OpenVINO runtime bin: $ovBin"

          Copy-Item "$ovBin\*.dll" "dist\" -Force -ErrorAction SilentlyContinue
          Copy-Item "$ovBin\*.xml" "dist\" -Force -ErrorAction SilentlyContinue

          # Copy TBB DLLs if present
          Get-ChildItem -Path $ovRoot -Recurse -Filter "tbb*.dll" -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName "dist\" -Force }

      - name: Smoke test (help)
        shell: pwsh
        run: |
          & ".\dist\llama-server.exe" --help | Out-Null

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\*" -DestinationPath "llama-server-win-openvino-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-openvino-x64
          path: llama-server-win-openvino-x64.zip
