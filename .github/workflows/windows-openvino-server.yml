name: windows-openvino-llama-server

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build-windows-openvino-server:
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release

      # OpenVINO archive install (Windows) - download/extract automation supported by OpenVINO docs.
      OV_VERSION: "2026.0.0.20965.c6d6a13a886"
      OV_URL: "https://storage.openvinotoolkit.org/repositories/openvino/packages/2026.0/windows/openvino_toolkit_windows_2026.0.0.20965.c6d6a13a886_x86_64.zip"

      # Our controlled vcpkg clone
      VCPKG_ROOT: "C:\\vcpkg"
      VCPKG_TRIPLET: "x64-windows"

    steps:
      # ------------------------------------------------------------
      # Source
      # ------------------------------------------------------------
      - name: Checkout llama.cpp
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Toolchain
      # ------------------------------------------------------------
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # VS toolchains may override VCPKG_ROOT; force ours back for subsequent steps.
      - name: Force VCPKG_ROOT back to C:\vcpkg
        shell: pwsh
        run: |
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VCPKG_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Ensure Ninja is available for -G Ninja builds.
      - name: Ensure Ninja is installed
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            winget install --id Ninja-build.Ninja -e --source winget --accept-source-agreements --accept-package-agreements
          }
          ninja --version

      # ------------------------------------------------------------
      # OpenVINO runtime (archive install)
      # ------------------------------------------------------------
      - name: Cache OpenVINO
        uses: actions/cache@v4
        with:
          path: C:\openvino
          key: openvino-${{ env.OV_VERSION }}-windows-x64

      - name: Download + Extract OpenVINO (if not cached)
        shell: pwsh
        run: |
          if (!(Test-Path "C:\openvino")) {
            New-Item -ItemType Directory -Force -Path "C:\ovtmp" | Out-Null
            Write-Host "Downloading OpenVINO..."
            curl.exe -L "$env:OV_URL" --output "C:\ovtmp\openvino.zip"
            Expand-Archive -Path "C:\ovtmp\openvino.zip" -DestinationPath "C:\ovtmp\extract"
            $dir = Get-ChildItem "C:\ovtmp\extract" | Where-Object { $_.PSIsContainer } | Select-Object -First 1
            if (-not $dir) { throw "OpenVINO archive extraction failed (no directory found)." }
            Move-Item $dir.FullName "C:\openvino"
          }

      # ------------------------------------------------------------
      # vcpkg (shallow clone + baseline)
      # ------------------------------------------------------------
      - name: Cache vcpkg repo
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-repo-windows-shallow

      - name: Cache vcpkg_installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-installed-windows-${{ env.VCPKG_TRIPLET }}-opencl

      - name: Ensure vcpkg is a real git repo (shallow clone if needed)
        shell: pwsh
        run: |
          $root = "$env:VCPKG_ROOT"
          $exe  = Join-Path $root "vcpkg.exe"
          $gitd = Join-Path $root ".git"

          $needClone = $false
          if (!(Test-Path $exe)) { $needClone = $true }
          elseif (!(Test-Path $gitd)) { $needClone = $true }

          if ($needClone) {
            if (Test-Path $root) { Remove-Item -Recurse -Force $root }
            git clone --depth 1 https://github.com/microsoft/vcpkg $root
            & (Join-Path $root "bootstrap-vcpkg.bat")
          }

          & $exe version

      - name: Create vcpkg manifest with builtin-baseline (OpenCL)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          # Many manifest-mode vcpkg instances require builtin-baseline for default registry.
          $baseline = (git -C "$env:VCPKG_ROOT" rev-parse HEAD).Trim()
          if (-not $baseline -or $baseline.Length -lt 40) { throw "Failed to compute vcpkg baseline SHA." }

          @"
          {
            "name": "llama-openvino-ci",
            "version-string": "0.0.1",
            "dependencies": [
              "opencl"
            ],
            "builtin-baseline": "$baseline"
          }
          "@ | Out-File -Encoding utf8 vcpkg.json

          Write-Host "Using vcpkg builtin-baseline: $baseline"

      - name: Install OpenCL (vcpkg manifest mode)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet $env:VCPKG_TRIPLET

      # ------------------------------------------------------------
      # Build llama.cpp (OpenVINO backend)
      # ------------------------------------------------------------
      - name: Configure + Build llama-server (OpenVINO)
        shell: cmd
        run: |
          call C:\openvino\setupvars.bat

          set "VCPKG_ROOT=C:\vcpkg"
          set "VCPKG_TRIPLET=x64-windows"

          cmake -S . -B build\ReleaseOV -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DGGML_OPENVINO=ON ^
            -DLLAMA_CURL=OFF ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=%VCPKG_TRIPLET% ^
            -DCMAKE_MAKE_PROGRAM=ninja

          cmake --build build\ReleaseOV --config %BUILD_TYPE% --parallel

      # ------------------------------------------------------------
      # Stage outputs
      # ------------------------------------------------------------
      - name: Stage llama-server.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = Get-ChildItem build\ReleaseOV -Recurse -Filter llama-server.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "llama-server.exe not found" }
          Copy-Item $exe.FullName dist\llama-server.exe -Force

      # ------------------------------------------------------------
      # Bundle OpenVINO (folder-based) + wrapper
      # ------------------------------------------------------------
      - name: Bundle OpenVINO runtime (folder-based) + wrapper
        shell: pwsh
        run: |
          $ovRoot = "C:\openvino"
          $ovDll = Get-ChildItem -Path $ovRoot -Recurse -Filter "openvino.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ovDll) { throw "openvino.dll not found under $ovRoot" }

          $ovBin = $ovDll.Directory.FullName
          Write-Host "OpenVINO bin detected: $ovBin"

          $dest = Join-Path $env:GITHUB_WORKSPACE "dist\openvino-bin"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          # Copy EVERYTHING from the OpenVINO bin dir (DLLs + plugins.xml and other runtime files)
          Copy-Item -Path (Join-Path $ovBin "*") -Destination $dest -Recurse -Force

          # Copy TBB DLLs if present anywhere (common dependency in OpenVINO distributions)
          Get-ChildItem -Path $ovRoot -Recurse -Filter "tbb*.dll" -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName $dest -Force -ErrorAction SilentlyContinue }

          # Create a wrapper that sets PATH to bundled OpenVINO bin before launching
          $wrapper = @"
          @echo off
          setlocal
          set "THIS=%~dp0"
          set "PATH=%THIS%openvino-bin;%PATH%"
          "%THIS%llama-server.exe" %*
          endlocal
          "@
          $wrapper | Out-File -Encoding ascii (Join-Path $env:GITHUB_WORKSPACE "dist\run-llama-server.cmd")

      # ------------------------------------------------------------
      # Smoke test diagnostics (captures stdout/stderr/exitcode)
      # ------------------------------------------------------------
      - name: Smoke test diagnostics (wrapper, capture stderr)
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "dist\run-llama-server.cmd"
          if (!(Test-Path $exe)) { throw "Missing wrapper: $exe" }

          $p = Start-Process -FilePath $exe -ArgumentList "--help" -NoNewWindow -Wait -PassThru `
                -RedirectStandardOutput "stdout.txt" -RedirectStandardError "stderr.txt"

          Write-Host "ExitCode: $($p.ExitCode)"
          Write-Host "---- STDOUT ----"
          if (Test-Path "stdout.txt") { Get-Content "stdout.txt" -ErrorAction SilentlyContinue }
          Write-Host "---- STDERR ----"
          if (Test-Path "stderr.txt") { Get-Content "stderr.txt" -ErrorAction SilentlyContinue }

          if ($p.ExitCode -ne 0) { exit $p.ExitCode }

      # Optional: prove it runs also when OpenVINO env is set (closer to upstream doc usage)
      - name: Smoke test (direct exe) with OpenVINO env
        shell: cmd
        run: |
          call C:\openvino\setupvars.bat
          "%GITHUB_WORKSPACE%\dist\llama-server.exe" --help

      # ------------------------------------------------------------
      # Package + upload
      # ------------------------------------------------------------
      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath llama-server-win-openvino-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-openvino-x64
          path: llama-server-win-openvino-x64.zip
